name: Bump ai-memory formula

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump-ai-memory-formula
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tap
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update formula from latest upstream release
        id: bump
        run: |
          scripts/bump-formula.sh

          if git diff --quiet -- Formula/ai-memory.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          branch="bump-ai-memory-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add Formula/ai-memory.rb
          git commit -m "Bump ai-memory to ${VERSION}"
          git push --force-with-lease origin "$branch"

          body="$(printf '%s\n' \
            "Updates the ai-memory Homebrew formula to v${VERSION}." \
            "" \
            "This PR was generated by the scheduled bump workflow:" \
            "- reads the latest release from akitaonrails/ai-memory" \
            "- downloads macOS Apple Silicon and Intel tarballs" \
            "- recalculates SHA256 values" \
            "- updates Formula/ai-memory.rb"
          )"

          if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Bump ai-memory to ${VERSION}" \
              --body "$body"
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base "$BASE_BRANCH" \
              --head "$branch" \
              --title "Bump ai-memory to ${VERSION}" \
              --body "$body"
          fi
