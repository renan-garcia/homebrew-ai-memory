name: Bump ai-memory formula

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

permissions:
  contents: write

concurrency:
  group: bump-ai-memory-formula
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tap
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update formula from latest upstream release
        id: bump
        run: |
          scripts/bump-formula.sh

          if git diff --quiet -- Formula/ai-memory.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated formula
        if: steps.bump.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/ai-memory.rb
          git commit -m "Bump ai-memory to ${VERSION}"
          git push origin "HEAD:${BASE_BRANCH}"
